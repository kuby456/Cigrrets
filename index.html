<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta charset="UTF-8">
<title>מחשבון עישון</title>

  <style>
    :root {
      --bg: #0a0c14;
      --card: #151a27;
      --accent: #00e0ff;
      --text: #ffffff;
      --text-light: #b0b8d0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, var(--bg) 0%, #111827 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      min-height: 100dvh;
      padding: 20px 15px 40px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    h2 {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 32px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0, 224, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* כפתורים ראשיים */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      max-width: 520px;
      margin: 0 auto;
    }

    button {
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #00b8d4);
      color: #000;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 
        0 8px 20px rgba(0, 224, 255, 0.3),
        0 4px 10px rgba(0, 0, 0, 0.2);
      flex: 1;
      min-width: 160px;
      max-width: 240px;
    }

    button:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 
        0 12px 28px rgba(0, 224, 255, 0.4),
        0 6px 15px rgba(0, 0, 0, 0.3);
      background: white;
    }

    button:active {
      transform: scale(0.95);
    }

    /* תיבת הסטטיסטיקות */
    .box {
      margin: 40px auto 0;
      max-width: 460px;
      background: var(--card);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255,255,255,0.08) inset;
      font-size: 1.25rem;
      line-height: 2.1;
      text-align: right;
      color: var(--text-light);
    }

    .box strong {
      color: var(--accent);
      font-weight: 700;
    }

    /* POPUP */
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 20, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
    }

    .popup.active {
      opacity: 1;
      visibility: visible;
    }

    .popup-content {
      background: #1e2536;
      padding: 32px 28px;
      border-radius: 24px;
      width: 92%;
      max-width: 340px;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(0, 224, 255, 0.15) inset;
      animation: popupPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
    }

    @keyframes popupPop {
      0%   { transform: scale(0.7) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .popup-content h3 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: #fff;
    }

    .popup-content button {
      width: 100%;
      margin: 8px 0;
      padding: 15px;
      font-size: 1.15rem;
      border-radius: 14px;
    }

    .popup-content button:first-child {
      background: #00e0ff;
      color: #000;
      font-weight: 700;
    }

    .popup-content button:last-child {
      background: #333c52;
      color: #fff;
    }

    /* טקסטים קטנים */
    .small {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 6px;
    }

    /* התאמה למובייל */
    @media (max-width: 480px) {
      h2 { font-size: 1.85rem; }
      button { font-size: 1.05rem; padding: 15px 20px; }
      .box { font-size: 1.15rem; padding: 24px 20px; }
    }
  </style>
</head>

<body>

<h2>🚬 מחשבון עישון</h2>

<div>
  <button onclick="ask('addPack')">➕ קנית קופסה</button>
  <button onclick="ask('finishPack')">🗑️ גמרת קופסה</button>
  <button onclick="ask('addCig')">🚬 סיגריה ידנית</button>
</div>

<div class="box" id="stats"></div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>אתה בטוח?</h3>
    <button onclick="confirmAction()">✔ כן</button>
    <button onclick="closePopup()">❌ לא</button>
  </div>
</div>

<script>
// ================= DATA =================
let data = {
  packsBought: 0,
  packsFinished: 0,
  manualCigs: 0,
  startTime: null,
  pricePerPack: 42
};

let pendingAction = null;

// ================= INIT =================
function load() {
  let saved = localStorage.getItem("smokeTracker");
  if (saved) {
    data = JSON.parse(saved);
  } else {
    data.startTime = Date.now();
  }
  update();
}

function save() {
  localStorage.setItem("smokeTracker", JSON.stringify(data));
}

// ================= POPUP =================
function ask(action) {
  pendingAction = action;
  document.getElementById("popup").classList.add("active");
}

function closePopup() {
  document.getElementById("popup").classList.remove("active");
}

function confirmAction() {
  if (pendingAction === "addPack") addPack();
  if (pendingAction === "finishPack") finishPack();
  if (pendingAction === "addCig") addCig();
  closePopup();
}

// ================= ACTIONS =================
function addPack() {
  data.packsBought++;
  save();
  update();
}

function finishPack() {
  if (data.packsFinished < data.packsBought) {
    data.packsFinished++;
  }
  save();
  update();
}

function addCig() {
  data.manualCigs++;

  // אם הגיע ל-20 → הופך לקופסה
  if (data.manualCigs >= 20) {
    data.packsFinished++;
    data.manualCigs -= 20;
  }

  save();
  update();
}

// ================= CALCULATIONS =================
function update() {

  let totalCigs = (data.packsBought * 20) + data.manualCigs;

  let smokedCigs = (data.packsFinished * 20) + data.manualCigs;

  let smokedPacks = Math.floor(smokedCigs / 20);

  // ================= זמן =================
  let now = Date.now();
  let totalMs = now - data.startTime;

  let totalDays = totalMs / (1000*60*60*24);

  // זמן ערות (פחות 8 שעות ביום)
  let awakeHours = totalDays * 16;

  // ================= ממוצע =================
  let avgTimeBetween = 0;

  if (smokedCigs > 0) {
    avgTimeBetween = awakeHours / smokedCigs; // שעות בין סיגריות
  }

  // המרה לדקות (יותר נוח)
  let avgMinutes = avgTimeBetween * 60;

  // ================= כסף =================
  let money = data.packsBought * data.pricePerPack;

  document.getElementById("stats").innerHTML = `
  📦 קנית: ${data.packsBought} קופסאות<br>
  🗑️ גמרת: ${data.packsFinished} קופסאות<br>
  🚬 סיגריות שעישנת: ${smokedCigs}<br>
  📊 קופסאות שעישנת: ${smokedPacks}<br><br>

  📅 ימים שעברו: ${totalDays.toFixed(1)}<br>
  ⏱️ זמן ערות: ${awakeHours.toFixed(1)} שעות<br><br>

  📉 זמן ממוצע בין סיגריות: ${avgMinutes.toFixed(1)} דקות<br><br>

  💰 כסף שבוזבז: ₪${money}
  `;
}
// ================= START =================
load();
</script>

</body>
</html>
