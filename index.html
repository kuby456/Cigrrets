<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מונה קופסאות וסיגריות</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #222;
      color: white;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-main {
      background: #1db954;
      color: white;
      width: 100%;
    }

    .btn-danger {
      background: #d32f2f;
      color: white;
    }

    .btn-secondary {
      background: #2d2d2d;
      color: white;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }

    .stat-box {
      background: #222;
      padding: 14px;
      border-radius: 14px;
    }

    .stat-title {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    .money::before {
      content: "₪";
      margin-left: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2c2c2c;
      font-size: 14px;
    }

    th {
      background: #222;
    }

    tr {
      background: #181818;
    }

    .small {
      color: #aaa;
      font-size: 13px;
      margin-top: 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .stat-value {
        font-size: 20px;
      }

      th, td {
        font-size: 12px;
        padding: 8px;
      }
    }
  .btn-main {
  background: #3a3a3a;
  color: white;
    
}
  .btn-main:hover {
  background: #505050;
}
  
  
  </style>
</head>
<body>
  
  <div class="card">
  <button class="btn-main" onclick="addCigarette()">+ סיגריה</button>
  <button class="btn-main" onclick="addPack()">+ קופסה</button>
  <button class="btn-secondary" onclick="undoLastAction()">↩ בטל פעולה</button>
</div>

    <div class="card">
      <h2>סיכום כללי</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-title">סך הכול קופסאות</div>
          <div class="stat-value" id="totalPacks">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-title">סך הכול סיגריות</div>
          <div class="stat-value" id="totalCigarettes">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-title">סך הכול שילמת</div>
          <div class="stat-value money" id="totalPaid">0.00</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>טווחי זמן</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-title">ב־24 שעות האחרונות</div>
          <div>סיגריות: <strong id="cigs24h">0</strong></div>
          <div>קופסאות: <strong id="packs24h">0</strong></div>
        </div>

        <div class="stat-box">
          <div class="stat-title">ביומיים האחרונים</div>
          <div>סיגריות: <strong id="cigs2d">0</strong></div>
          <div>קופסאות: <strong id="packs2d">0</strong></div>
        </div>

        <div class="stat-box">
          <div class="stat-title">ב־3 הימים האחרונים</div>
          <div>סיגריות: <strong id="cigs3d">0</strong></div>
          <div>קופסאות: <strong id="packs3d">0</strong></div>
        </div>

        <div class="stat-box">
          <div class="stat-title">בשבוע האחרון</div>
          <div>סיגריות: <strong id="cigs7d">0</strong></div>
          <div>קופסאות: <strong id="packs7d">0</strong></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="actions">
        <button class="btn-secondary" onclick="exportData()">ייצוא נתונים</button>
       </div>
    </div>

    <div class="card">
      <h2>היסטוריית רישומים</h2>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>תאריך</th>
              <th>קופסאות</th>
              <th>בודדות</th>
              <th>סיגריות</th>
              <th>שולם</th>
              <th>מחיקה</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
const STORAGE_KEY = "smoking_tracker_entries";

const PACK_PRICE = 41;
const CIG_PRICE = 41 / 20;

function getEntries() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ➕ הוספת סיגריה
function addCigarette() {
  const entries = getEntries();

  entries.push({
    id: Date.now(),
    datetime: new Date().toISOString(),
    packs: 0,
    singles: 1,
    cigarettes: 1,
    paid: CIG_PRICE
  });

  saveEntries(entries);
  renderAll();
}

// ➕ הוספת קופסה
function addPack() {
  const entries = getEntries();

  entries.push({
    id: Date.now(),
    datetime: new Date().toISOString(),
    packs: 1,
    singles: 0,
    cigarettes: 20,
    paid: PACK_PRICE
  });

  saveEntries(entries);
  renderAll();
}

function deleteEntry(id) {
  const entries = getEntries().filter(e => e.id !== id);
  saveEntries(entries);
  renderAll();
}

function clearAllData() {
  if (!confirm("למחוק הכל?")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
}

function sumEntries(entries) {
  return entries.reduce((acc, e) => {
    acc.cigarettes += e.cigarettes;
    acc.packs += e.packs + (e.singles / 20);
    acc.paid += e.paid;
    return acc;
  }, { cigarettes: 0, packs: 0, paid: 0 });
}

function filterByHours(h) {
  const now = new Date();
  const since = new Date(now.getTime() - h * 3600000);
  return getEntries().filter(e => new Date(e.datetime) >= since);
}

function filterByDays(d) {
  const now = new Date();
  const since = new Date(now.getTime() - d * 86400000);
  return getEntries().filter(e => new Date(e.datetime) >= since);
}

function renderStats() {
  const total = sumEntries(getEntries());

  totalPacks.textContent = total.packs.toFixed(2);
  totalCigarettes.textContent = total.cigarettes;
  totalPaid.textContent = total.paid.toFixed(2);

  const h24 = sumEntries(filterByHours(24));
  const d2 = sumEntries(filterByDays(2));
  const d3 = sumEntries(filterByDays(3));
  const d7 = sumEntries(filterByDays(7));

  cigs24h.textContent = h24.cigarettes;
  packs24h.textContent = h24.packs.toFixed(2);

  cigs2d.textContent = d2.cigarettes;
  packs2d.textContent = d2.packs.toFixed(2);

  cigs3d.textContent = d3.cigarettes;
  packs3d.textContent = d3.packs.toFixed(2);

  cigs7d.textContent = d7.cigarettes;
  packs7d.textContent = d7.packs.toFixed(2);
}

function renderHistory() {
  const entries = getEntries().sort((a,b)=>new Date(b.datetime)-new Date(a.datetime));

  historyTable.innerHTML = entries.map(e => `
    <tr>
      <td>${new Date(e.datetime).toLocaleString("he-IL")}</td>
      <td>${e.packs}</td>
      <td>${e.singles}</td>
      <td>${e.cigarettes}</td>
      <td>₪${e.paid.toFixed(2)}</td>
      <td><button onclick="deleteEntry(${e.id})">❌</button></td>
    </tr>
  `).join("");
}

function renderAll() {
  renderStats();
  renderHistory();
}
  
  
  // 🔙 ביטול פעולה אחרונה
function undoLastAction() {
  const entries = getEntries();

  if (entries.length === 0) {
    alert("אין מה לבטל");
    return;
  }

  entries.pop(); // מוחק את האחרון
  saveEntries(entries);
  renderAll();
}

renderAll();
</script>
</body>
</html>
