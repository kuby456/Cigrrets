<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>מונה לחיצות</title>

<style>
body{
  margin:0;
  font-family:system-ui,Arial;
  background:#f4f6fb;
  color:#111;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.card{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:12px 0;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button.secondary{
  background:#64748b;
}

button.danger{
  background:#dc2626;
}

.meta{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  color:#555;
}

.big{
  font-size:22px;
  font-weight:800;
  margin-top:6px;
}

ul{
  list-style:none;
  padding:0;
  margin:0;
}

li{
  padding:10px 0;
  border-bottom:1px solid #e5e7eb;
}

.pill{
  display:inline-block;
  background:#eef2ff;
  padding:4px 10px;
  border-radius:999px;
  margin-left:6px;
  font-size:13px;
}

</style>
</head>

<body>
<div class="wrap">

<h1>🕒 מונה לחיצות</h1>

<div class="card">
<div class="meta">
<div>סה״כ לחיצות: <b id="count">0</b></div>
<div>לחיצה אחרונה: <b id="lastClick">—</b></div>
</div>

<div class="row">
<button id="clickBtn">לחיצה</button>
<button class="secondary" id="avgBtn">חשב ממוצע</button>
<button class="danger" id="clearBtn">איפוס</button>
</div>

<div>
ממוצע בין לחיצות:
<div class="big" id="avgText">—</div>
</div>
</div>

<div class="card">
<ul id="list"></ul>
</div>

</div>

<script>

const KEY="counter_light";

const countEl=document.getElementById("count");
const lastEl=document.getElementById("lastClick");
const list=document.getElementById("list");
const avgEl=document.getElementById("avgText");

let data=JSON.parse(localStorage.getItem(KEY)||'{"clicks":[]}');

function save(){
localStorage.setItem(KEY,JSON.stringify(data));
}

function words(ms){
let s=Math.round(ms/1000);
let h=Math.floor(s/3600);
let m=Math.floor(s%3600/60);
let sec=s%60;
let t=[];
if(h)t.push(h+" שעות");
if(m)t.push(m+" דקות");
if(!h&&!m)t.push(sec+" שניות");
return t.join(" ו");
}

function render(){
countEl.textContent=data.clicks.length;
lastEl.textContent=data.clicks[0]?.date||"—";
list.innerHTML="";
data.clicks.forEach((c,i)=>{
let li=document.createElement("li");
li.innerHTML=`<span class=pill>#${data.clicks.length-i}</span>
<span class=pill>${c.date}</span>
<span class=pill>${c.delta}</span>`;
list.appendChild(li);
});
}

render();

clickBtn.onclick=()=>{
let now=Date.now();
let delta=data.clicks.length?words(now-data.clicks[0].ts):"ראשון";
data.clicks.unshift({
ts:now,
date:new Date(now).toLocaleString("he-IL"),
delta:delta
});
save();
render();
};

avgBtn.onclick=()=>{
if(data.clicks.length<1){
avgEl.textContent="אין לחיצות";
return;
}

let first=data.clicks[data.clicks.length-1].ts; // הלחיצה הראשונה
let last=data.clicks[0].ts; // הלחיצה האחרונה

let totalTime=last-first;

let avg=totalTime/(data.clicks.length-1);

avgEl.textContent=words(avg);
};

clearBtn.onclick=()=>{
if(confirm("למחוק הכל?")){
data={clicks:[]};
localStorage.removeItem(KEY);
avgEl.textContent="—";
render();
}
};

</script>
</body>
</html>
